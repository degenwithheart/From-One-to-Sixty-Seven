name: FOTS Compliance

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  compliance-check:
    name: Compliance Validation
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install FOTS CLI
        run: |
          npm install -g fots || npm ci

      - name: Run FOTS compliance check
        id: fots-check
        run: |
          # For PRs, check against base branch
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            fots check --diff $BASE_SHA --format github --output fots-report.json
          else
            # For pushes, check staged files
            fots check --ci --format github --output fots-report.json
          fi
        continue-on-error: true

      - name: Upload compliance report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fots-compliance-report
          path: fots-report.json
          retention-days: 30

      - name: Comment PR with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            
            let report = { passed: true, summary: {} };
            try {
              report = JSON.parse(fs.readFileSync('fots-report.json', 'utf8'));
            } catch {
              console.log('No report found');
            }
            
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            
            const botComment = comments.find(comment => 
              comment.user.type === 'Bot' && 
              comment.body.includes('FOTS Compliance Check')
            );
            
            const body = `## 🔍 FOTS Compliance Check
            
            **Status:** ${report.passed ? '✅ PASSED' : '❌ FAILED'}
            
            | Metric | Value |
            |--------|-------|
            | Files Checked | ${report.summary?.checkedFiles || 0} |
            | Errors | ${report.summary?.errors || 0} |
            | Warnings | ${report.summary?.warnings || 0} |
            
            ${!report.passed ? '⚠️ Please address the compliance issues before merging.' : '🎉 All checks passed!'}
            `;
            
            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Fail on violations
        if: steps.fots-check.outcome == 'failure'
        run: |
          echo "::error::FOTS compliance check failed. Please fix the violations."
          exit 1

  coverage-report:
    name: Generate Coverage Report
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install FOTS CLI
        run: npm install -g fots || npm ci

      - name: Generate compliance report
        run: fots report --format html --output fots-report.html --trend

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          destination_dir: fots-reports
          keep_files: true
